name: ci

# Green before anything else. Build, the offline evals (no credits), and a
# syntax check on the Function. See docs/orchestration.md (definition of done).
on:
  push:
  pull_request:

jobs:
  build-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # Scans tracked files for secret-shaped/PII-shaped patterns (Firebase API
      # keys, hex secrets, literal emails) before they can land. A local
      # pre-commit hook running the same script is a further option, not
      # required to ship this guard.
      - name: Secret guard
        run: node scripts/check-secrets.mjs

      - name: Build
        run: npm run build

      - name: Offline evals (no credits)
        run: npm run eval

      # npm run eval already runs this (see above); a separate step keeps a
      # sync regression visible as its own red X rather than buried inside
      # the eval step's output. See docs/resolution-log.md, 2026-07-06, for
      # why this hand-synced duplication needs its own guard.
      - name: Prompt sync check
        run: npm run check:prompt-sync

      - name: Function syntax check
        run: node --check functions/index.js
