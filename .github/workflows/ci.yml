name: ci

# Green before anything else. Build, the offline evals (no credits), and a
# syntax check on the Function. See docs/orchestration.md (definition of done).
on:
  push:
  pull_request:

jobs:
  build-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Offline evals (no credits)
        run: npm run eval:offline

      - name: Function syntax check
        run: node --check functions/index.js
